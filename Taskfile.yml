# Task runner (go-task). The phase gates in PROJECT-BOOK.md §7.10 are expressed
# as the lint / test / test:integration / build targets below.
version: "3"

vars:
  BIN: build/bin/conductor

tasks:
  default:
    cmds:
      - task --list
    silent: true

  tidy:
    desc: Sync go.mod/go.sum.
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go sources with gofumpt.
    cmds:
      - gofumpt -w .

  lint:
    desc: "Phase gate: gofumpt check + go vet + golangci-lint + govulncheck."
    deps:
      - frontend:build
    cmds:
      - 'test -z "$(gofumpt -l .)" || { echo "gofumpt: files need formatting (run task fmt):"; gofumpt -l .; exit 1; }'
      - go vet ./...
      - golangci-lint run
      - govulncheck ./...

  test:
    desc: "Phase gate: unit tests, green on a bare machine (no rclone/keyring)."
    deps:
      - frontend:build
    cmds:
      - go test ./...

  test:integration:
    desc: "Phase gate: build-tagged integration tests (real rclone/keyring if present)."
    cmds:
      - go test -tags=integration ./...

  frontend:install:
    desc: Install frontend dependencies from the committed lockfile.
    dir: frontend
    cmds:
      - npm ci

  bindings:
    desc: Regenerate the committed typed Wails frontend bindings (§2.8) when bound Go types change.
    deps:
      - frontend:build
    cmds:
      - wails generate module

  frontend:check:
    desc: Type-check the frontend (svelte-check / strict TS).
    dir: frontend
    cmds:
      - npm run check

  frontend:build:
    desc: Build the frontend into frontend/dist for embedding.
    dir: frontend
    cmds:
      - npm run build

  build:
    desc: "Phase gate: build the runnable, window-opening binary (frontend embedded)."
    deps:
      - frontend:build
    vars:
      # Wails requires the desktop+production build tags; without them the
      # binary refuses to start. Linux with webkit2gtk-4.1 needs the
      # webkit2_41 tag; macOS additionally links the UniformTypeIdentifiers
      # framework.
      TAGS: 'desktop,production{{if eq OS "linux"}},webkit2_41{{end}}'
      MAC_LDFLAGS: '{{if eq OS "darwin"}}-framework UniformTypeIdentifiers{{end}}'
    cmds:
      - CGO_ENABLED=1 CGO_LDFLAGS="{{.MAC_LDFLAGS}}" go build -tags "{{.TAGS}}" -ldflags "-w -s" -o {{.BIN}} .

  rclone:fetch:
    desc: "Download + verify the pinned rclone into the data dir (ADR-0008, operator-initiated)."
    vars:
      # Keep in sync with internal/core/rclonebin.PinnedVersion.
      VERSION: v1.74.3
    cmds:
      - |
        set -eu
        VER="{{.VERSION}}"
        case "$(uname -s)" in
          Darwin) OS=osx ;;
          Linux)  OS=linux ;;
          *) echo "unsupported OS"; exit 1 ;;
        esac
        case "$(uname -m)" in
          arm64|aarch64) ARCH=arm64 ;;
          x86_64|amd64)  ARCH=amd64 ;;
          *) echo "unsupported arch"; exit 1 ;;
        esac
        if [ "$OS" = osx ]; then DATA="$HOME/Library/Application Support/conductor/data"; else DATA="${XDG_DATA_HOME:-$HOME/.local/share}/conductor"; fi
        PLAT="$OS-$ARCH"; ZIP="rclone-$VER-$PLAT.zip"
        TMP="$(mktemp -d)"; trap 'rm -rf "$TMP"' EXIT
        echo "Downloading $ZIP ..."
        curl -fsSL "https://downloads.rclone.org/$VER/$ZIP" -o "$TMP/$ZIP"
        curl -fsSL "https://downloads.rclone.org/$VER/SHA256SUMS" -o "$TMP/SHA256SUMS"
        ( cd "$TMP" && grep " $ZIP\$" SHA256SUMS | shasum -a 256 -c - )
        ( cd "$TMP" && unzip -qo "$ZIP" )
        mkdir -p "$DATA/bin"
        install -m 0755 "$TMP/rclone-$VER-$PLAT/rclone" "$DATA/bin/rclone"
        echo "Installed verified rclone $VER to $DATA/bin/rclone"
        "$DATA/bin/rclone" version | head -1

  run:
    desc: Build and launch Conductor (opens the desktop window).
    deps:
      - build
    cmds:
      - ./{{.BIN}}
